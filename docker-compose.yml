services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bom-app
    container_name: bom-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html:cached
      - ./storage:/var/www/html/storage
      - ./vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
    command: ["sh", "-lc", "if [ ! -f .env ]; then cp .env.example .env; fi && mkdir -p database && touch database/database.sqlite && php artisan key:generate --ansi && php artisan migrate:fresh --seed --force && php artisan serve --host=0.0.0.0 --port=8000"]

volumes:
  dbdata:
